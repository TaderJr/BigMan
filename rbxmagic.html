<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BigMan's Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --pink:    #FF68E8;
  --blue:    #69BFFF;
  --mid:     #B08AFF;
  --bg:      #0a0610;
  --surface: rgba(255,104,232,0.04);
  --border:  rgba(176,138,255,0.13);
  --text:    #f0eaff;
  --muted:   rgba(240,234,255,0.38);
  --gold:    #FFD166;
  --silver:  #C0C8D8;
  --bronze:  #CD8B5A;
}



html, body { min-height: 100vh; background: #08040f; color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 70% 50% at 50% -10%, rgba(255,104,232,0.18) 0%, transparent 65%),
    radial-gradient(ellipse 50% 40% at 100% 60%,  rgba(105,191,255,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 0%   80%,  rgba(176,138,255,0.10) 0%, transparent 60%);
}

body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(176,138,255,0.055) 1px, transparent 1px),
    linear-gradient(90deg, rgba(176,138,255,0.055) 1px, transparent 1px);
  background-size: 44px 44px;
}

canvas#ff { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

/* NAV — fixed top-right */
.nav {
  position: fixed;
  top: 20px; right: 24px;
  z-index: 100;
  display: flex; align-items: center; gap: 10px;
}

.btn-nav {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 11px 20px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: rgba(10,6,16,0.7);
  backdrop-filter: blur(16px);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px; font-weight: 500;
  text-decoration: none; cursor: pointer;
  transition: border-color .2s, background .2s, box-shadow .2s;
  white-space: nowrap;
}
.btn-nav:hover {
  border-color: rgba(176,138,255,0.45);
  background: rgba(255,104,232,0.08);
  box-shadow: 0 4px 22px rgba(176,138,255,0.14);
}
.btn-nav.kick { border-color: rgba(83,252,31,0.25); color: #b0ffb8; }
.btn-nav.kick:hover { border-color: rgba(83,252,31,0.55); background: rgba(83,252,31,0.08); box-shadow: 0 4px 22px rgba(83,252,31,0.12); }

.wrap { position: relative; z-index: 2; max-width: 860px; margin: 0 auto; padding: 100px 24px 80px; }

/* HERO */
.hero { text-align: center; margin-bottom: 40px; }
.hero-eyebrow { font-size: 11.5px; font-weight: 500; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
.hero-title { font-family: 'Inter', sans-serif; font-weight: 900; font-size: clamp(24px, 4vw, 40px); line-height: 1.06; letter-spacing: -.03em; text-shadow: 0 2px 40px rgba(0,0,0,0.6); }
.grad { background: linear-gradient(90deg, var(--pink), var(--mid) 50%, var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 0 20px rgba(176,138,255,.4)); }

/* TIMER */
.timer-wrap { display: flex; justify-content: center; margin-bottom: 56px; }
.timer {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 14px 28px;
  border: 1px solid rgba(176,138,255,0.2); border-radius: 20px;
  background: rgba(8,4,18,0.7); backdrop-filter: blur(24px);
  box-shadow: 0 4px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05), 0 0 0 1px rgba(176,138,255,0.06);
}
.timer-label { font-size: 10px; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: rgba(176,138,255,.45); margin-right: 12px; padding-bottom: 10px; align-self: center; }
.timer-seg { text-align: center; padding: 0 8px; }
.timer-num { font-family: 'Inter', sans-serif; font-size: 30px; font-weight: 800; color: var(--text); line-height: 1; min-width: 42px; display: inline-block; text-align: center; letter-spacing: -.03em; }
.timer-unit { font-size: 9px; font-weight: 600; letter-spacing: .15em; color: rgba(176,138,255,.4); text-transform: uppercase; display: block; margin-top: 5px; }
.timer-colon { font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 200; color: rgba(176,138,255,.25); padding-bottom: 10px; align-self: center; animation: blink 1s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.1} }

/* PODIUM */
.section-label { font-size: 10.5px; font-weight: 600; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); text-align: center; margin-bottom: 30px; }
.podium-stage { display: flex; align-items: flex-end; justify-content: center; gap: 10px; margin-bottom: 0; }

.p-col { display: flex; flex-direction: column; align-items: center; flex: 1; max-width: 230px; }
.p-info { display: flex; flex-direction: column; align-items: center; margin-bottom: 14px; }
.p-crown { margin-bottom: 10px; }

.p-avatar {
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-family: 'Inter', sans-serif; font-weight: 700; color: #fff;
  margin-bottom: 10px; border: 2px solid transparent; flex-shrink: 0;
  width: 48px; height: 48px; font-size: 17px;
  position: relative;
}
.p-col.p1 .p-avatar {
  background: linear-gradient(135deg,#7a2ff7,#c26aff);
  border-color: rgba(255,104,232,.4);
  box-shadow: 0 0 0 4px rgba(194,106,255,.12), 0 0 28px rgba(194,106,255,.4);
  width: 60px; height: 60px; font-size: 22px;
}
.p-col.p2 .p-avatar { background: linear-gradient(135deg,#3d4a5e,#8090a8); border-color: rgba(192,200,216,.3); box-shadow: 0 0 16px rgba(148,163,184,.2); }
.p-col.p3 .p-avatar { background: linear-gradient(135deg,#6b3a1f,#c07040); border-color: rgba(205,139,90,.3); box-shadow: 0 0 16px rgba(205,139,90,.2); }

.p-name { font-family:'Inter',sans-serif; font-size:14px; font-weight:600; color:var(--text); max-width:150px; text-align:center; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; margin-bottom:4px; }
.p-wager { font-size:13px; font-weight:400; color:var(--muted); margin-bottom:6px; }
.p-prize { font-family:'Inter',sans-serif; font-size:15px; font-weight:700; }
.p-col.p1 .p-prize { color:var(--gold); text-shadow: 0 0 12px rgba(255,209,102,.4); }
.p-col.p2 .p-prize { color:var(--silver); }
.p-col.p3 .p-prize { color:var(--bronze); }

.p-block { width:100%; border-radius:12px 12px 0 0; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
.p-block::after { content:''; position:absolute; top:0; left:0; right:0; height:1px; }

.p-col.p1 .p-block { height:130px; background:linear-gradient(180deg,rgba(122,47,247,.3) 0%,rgba(122,47,247,.08) 100%); border:1px solid rgba(255,104,232,.2); border-bottom:none; }
.p-col.p1 .p-block::after { background:linear-gradient(90deg,transparent,rgba(255,104,232,.6),transparent); }
.p-col.p2 .p-block { height:90px; background:linear-gradient(180deg,rgba(61,74,94,.3) 0%,rgba(61,74,94,.08) 100%); border:1px solid rgba(192,200,216,.16); border-bottom:none; }
.p-col.p2 .p-block::after { background:linear-gradient(90deg,transparent,rgba(192,200,216,.35),transparent); }
.p-col.p3 .p-block { height:64px; background:linear-gradient(180deg,rgba(107,58,31,.3) 0%,rgba(107,58,31,.08) 100%); border:1px solid rgba(205,139,90,.16); border-bottom:none; }
.p-col.p3 .p-block::after { background:linear-gradient(90deg,transparent,rgba(205,139,90,.35),transparent); }

.p-rank { font-family:'Inter',sans-serif; font-weight:900; font-size:36px; opacity:.07; color:#fff; user-select:none; letter-spacing:-.02em; }

.podium-floor { height:2px; background:linear-gradient(90deg,transparent,rgba(255,104,232,.25),rgba(176,138,255,.3),rgba(105,191,255,.25),transparent); border-radius:2px; margin-bottom:40px; }

/* TABLE */
.lb-card { border:1px solid var(--border); border-radius:20px; overflow:hidden; background:rgba(8,4,18,0.72); backdrop-filter:blur(24px); box-shadow: 0 8px 48px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04); }
.lb-head { display:grid; grid-template-columns:64px 1fr 160px 120px; padding:10px 22px; border-bottom:1px solid rgba(176,138,255,0.12); background: rgba(176,138,255,0.04); }
.lb-head span { font-size:10px; font-weight:700; letter-spacing:.2em; text-transform:uppercase; color:rgba(176,138,255,0.45); }
.lb-head span:nth-child(3), .lb-head span:nth-child(4) { text-align:right; }

.lb-row { display:grid; grid-template-columns:64px 1fr 160px 120px; padding:11px 22px; align-items:center; border-bottom:1px solid rgba(176,138,255,.05); transition:background .2s, transform .1s; position: relative; }
.lb-row:last-child { border-bottom:none; }
.lb-row:hover { background:rgba(255,104,232,.05); }
.lb-row.r1 { background:linear-gradient(90deg, rgba(122,47,247,.14) 0%, rgba(122,47,247,.04) 100%); border-bottom:1px solid rgba(255,104,232,.1); }
.lb-row.r1::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:linear-gradient(180deg,var(--pink),var(--mid)); border-radius:0 2px 2px 0; }
.lb-row.r2 { background:linear-gradient(90deg, rgba(80,90,110,.12) 0%, rgba(80,90,110,.03) 100%); }
.lb-row.r2::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--silver); border-radius:0 2px 2px 0; opacity:.5; }
.lb-row.r3 { background:linear-gradient(90deg, rgba(107,58,31,.12) 0%, rgba(107,58,31,.03) 100%); }
.lb-row.r3::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--bronze); border-radius:0 2px 2px 0; opacity:.6; }

.lb-rank { font-family:'Inter',sans-serif; font-size:15px; font-weight:800; color:rgba(176,138,255,.35); letter-spacing:-.01em; }
.lb-row.r1 .lb-rank { color:rgba(255,104,232,.8); font-size:16px; }
.lb-row.r2 .lb-rank { color:var(--silver); opacity:.8; }
.lb-row.r3 .lb-rank { color:var(--bronze); opacity:.9; }

.lb-user { display:flex; align-items:center; gap:14px; }
.lb-av {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Inter', sans-serif; font-weight: 800; font-size: 13px; color: #fff;
  flex-shrink: 0;
  background: rgba(176,138,255,.12);
  border: 1.5px solid rgba(176,138,255,.2);
  letter-spacing: -.01em;
}
.lb-row.r1 .lb-av { background: linear-gradient(135deg,#7a2ff7,#c26aff); border-color: rgba(255,104,232,.45); box-shadow: 0 0 16px rgba(194,106,255,.35), 0 0 0 3px rgba(194,106,255,.08); }
.lb-row.r2 .lb-av { background: linear-gradient(135deg,#3d4a5e,#8090a8); border-color: rgba(192,200,216,.3); box-shadow: 0 0 10px rgba(148,163,184,.15); }
.lb-row.r3 .lb-av { background: linear-gradient(135deg,#6b3a1f,#c07040); border-color: rgba(205,139,90,.3); box-shadow: 0 0 10px rgba(205,139,90,.15); }

.lb-uname { font-size: 14px; font-weight: 500; color: var(--text); letter-spacing: -.01em; }
.lb-row.r1 .lb-uname { color: #fff; }
.lb-wager { text-align: right; font-size: 13px; font-weight: 400; color: var(--muted); }
.lb-prize { text-align: right; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700; color: rgba(176,138,255,.3); }
.lb-row.r1 .lb-prize { color: var(--gold); text-shadow: 0 0 10px rgba(255,209,102,.3); }
.lb-row.r2 .lb-prize { color: var(--silver); }
.lb-row.r3 .lb-prize { color: var(--bronze); }

.foot { text-align: center; margin-top: 44px; font-size: 11px; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; color: rgba(240,234,255,.18); }

@media(max-width:600px){
  .lb-head,.lb-row { grid-template-columns:52px 1fr 110px; }
  .lb-head span:nth-child(3),.lb-wager { display:none; }
  .nav { top:14px; right:14px; }
  .wrap { padding-top: 90px; }
}
</style>
</head>

<div class="wrap">

  <div class="hero">
    <div class="hero-eyebrow">Wager Race · Top 3 Win Real Cash</div>
    <h1 class="hero-title">BigMan's <span class="grad">$300</span> Leaderboard</h1>
  </div>

  <div class="timer-wrap">
    <div class="timer">
      <span class="timer-label" id="timer-lbl">Ends in</span>
      <div class="timer-seg"><span class="timer-num" id="td">00</span><span class="timer-unit">days</span></div>
      <div class="timer-colon">:</div>
      <div class="timer-seg"><span class="timer-num" id="th">00</span><span class="timer-unit">hrs</span></div>
      <div class="timer-colon">:</div>
      <div class="timer-seg"><span class="timer-num" id="tm">00</span><span class="timer-unit">min</span></div>
      <div class="timer-colon">:</div>
      <div class="timer-seg"><span class="timer-num" id="ts">00</span><span class="timer-unit">sec</span></div>
    </div>
  </div>

<div style="text-align:center; padding:80px 24px; display:flex; flex-direction:column; align-items:center; gap:16px;">
    <div style="font-size:56px;">🔧</div>
    <div style="font-size:32px; font-weight:800; background:linear-gradient(90deg,#FF68E8,#B08AFF,#69BFFF); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; letter-spacing:-0.02em;">Under Maintenance</div>
    <div style="font-size:15px; color:rgba(240,234,255,0.45); max-width:360px; line-height:1.7;">The RBXMAGIC leaderboard is currently being updated. Check back soon!</div>
  </div>

  <div class="foot">Made by tader cutie patootie with diddy oil and yk what else</div>
</div>

<script>
// FIREFLIES
const cv=document.getElementById('ff'),cx=cv.getContext('2d');
function rsz(){cv.width=innerWidth;cv.height=innerHeight;}
addEventListener('resize',rsz);rsz();
const flies=Array.from({length:45},()=>({
  x:Math.random()*innerWidth, y:Math.random()*innerHeight,
  vx:(Math.random()-.5)*.3, vy:(Math.random()-.5)*.3,
  r:Math.random()*1.7+.5, a:Math.random(), da:(Math.random()-.5)*.009,
  h:Math.random()<.5?310:200
}));
(function loop(){
  cx.clearRect(0,0,cv.width,cv.height);
  flies.forEach(f=>{
    f.x+=f.vx;f.y+=f.vy;f.a+=f.da;
    if(f.a>1||f.a<0)f.da*=-1;
    if(f.x<0)f.x=cv.width;if(f.x>cv.width)f.x=0;
    if(f.y<0)f.y=cv.height;if(f.y>cv.height)f.y=0;
    cx.beginPath();cx.arc(f.x,f.y,f.r,0,Math.PI*2);
    cx.fillStyle=`hsla(${f.h},88%,76%,${f.a*.7})`;
    cx.shadowBlur=9;cx.shadowColor=`hsla(${f.h},88%,76%,.35)`;
    cx.fill();cx.shadowBlur=0;
  });
  requestAnimationFrame(loop);
})();

// TIMER
const END=new Date('2025-03-06T22:00:00-05:00');
const START=new Date('2025-02-27T22:00:00-05:00');
function pad(n){return String(n).padStart(2,'0');}
function tick(){
  const now=Date.now();
  document.getElementById('timer-lbl').textContent=now<START?'Starts in':'Ends in';
  let ms=now<START?START-now:Math.max(0,END-now);
  document.getElementById('td').textContent=pad(Math.floor(ms/86400000));
  document.getElementById('th').textContent=pad(Math.floor(ms%86400000/3600000));
  document.getElementById('tm').textContent=pad(Math.floor(ms%3600000/60000));
  document.getElementById('ts').textContent=pad(Math.floor(ms%60000/1000));
}
tick();setInterval(tick,1000);

// CROWNS
const PRIZES={1:150,2:100,3:50};
function ini(n){return(n||'?')[0].toUpperCase();}
function fmtR(n){return(n!=null&&n!==''&&n!==undefined)?'R$'+Number(n).toLocaleString():'—';}

function crown(type){
  const cols={gold:['#FFD166','#F59E0B','rgba(255,209,102,.5)'],silver:['#C0C8D8','#94a3b8','rgba(192,200,216,.38)'],bronze:['#CD8B5A','#a16207','rgba(205,139,90,.42)']}[type];
  return `<svg width="34" height="26" viewBox="0 0 34 26" fill="none" style="display:block;filter:drop-shadow(0 0 5px ${cols[2]})">
    <path d="M3 22L3 15L1 5.5L9 13L17 3L25 13L33 5.5L31 15L31 22Z" fill="${cols[0]}" stroke="${cols[1]}" stroke-width="1.2" stroke-linejoin="round"/>
    <rect x="3" y="22" width="28" height="3.5" rx="1.8" fill="${cols[0]}" stroke="${cols[1]}" stroke-width=".9"/>
    <circle cx="1" cy="5.5" r="2.2" fill="${cols[0]}" stroke="${cols[1]}" stroke-width=".9"/>
    <circle cx="17" cy="3" r="2.8" fill="${cols[0]}" stroke="${cols[1]}" stroke-width=".9"/>
    <circle cx="33" cy="5.5" r="2.2" fill="${cols[0]}" stroke="${cols[1]}" stroke-width=".9"/>
  </svg>`;
}

const EMPTY={username:'—',wagered:null};

function buildPodium(players){
  const p=[players[0]||EMPTY,players[1]||EMPTY,players[2]||EMPTY];
  const order=[{i:1,cls:'p2',ct:'silver',rank:2},{i:0,cls:'p1',ct:'gold',rank:1},{i:2,cls:'p3',ct:'bronze',rank:3}];
  return order.map(({i,cls,ct,rank})=>{
    const pl=p[i],name=pl.username||pl.name||'—';
    const wager=fmtR(pl.wagered||pl.wager||pl.amount);
    const prize=PRIZES[rank]?`$${PRIZES[rank]}`:'';
    return `<div class="p-col ${cls}">
      <div class="p-info">
        <div class="p-crown">${crown(ct)}</div>
        <div class="p-avatar">${name!=='—'?ini(name):rank}</div>
        <div class="p-name">${name}</div>
        <div class="p-wager">${wager}</div>
        ${prize?`<div class="p-prize">${prize}</div>`:''}
      </div>
      <div class="p-block"><span class="p-rank">${rank}</span></div>
    </div>`;
  }).join('');
}

function buildRows(players){
  return Array.from({length:Math.max(players.length,10)},(_,i)=>{
    const p=players[i]||EMPTY,rank=i+1;
    const name=p.username||p.name||'—';
    const cls=rank===1?'r1':rank===2?'r2':rank===3?'r3':'';
    return `<div class="lb-row ${cls}">
      <div class="lb-rank">#${rank}</div>
      <div class="lb-user"><div class="lb-av">${name!=='—'?ini(name):rank}</div><div class="lb-uname">${name}</div></div>
      <div class="lb-wager">${fmtR(p.wagered||p.wager||p.amount)}</div>
      <div class="lb-prize">${rank<=3&&PRIZES[rank]?'$'+PRIZES[rank]:'—'}</div>
    </div>`;
  }).join('');
}

async function load(){
  let players=[];
  try{
    const target=encodeURIComponent('https://api.rbxmagic.com/leaderboard?apiKey=721de613-2227-4ff2-b2da-d28ddadb01e2');
    const r=await fetch('https://corsproxy.io/?'+target);
    if(r.ok){const d=await r.json();players=Array.isArray(d)?d:d.data||d.leaderboard||d.players||d.results||d.entries||[];}
  }catch(e){console.warn('fetch failed:',e);}
  document.getElementById('podium').innerHTML=buildPodium(players);
  document.getElementById('lb-body').innerHTML=buildRows(players);
}
load();setInterval(load,120000);
</script>
